<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clicker Game Kids</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; height: 100vh; }
        .game-card { border-radius: 20px; border: 4px solid #ffc107; }
        #contador { font-size: 5rem; transition: transform 0.1s; color: #ffc107; }
    </style>
</head>
<body>

    <div class="container text-center">
        <div class="card game-card shadow-lg p-5 mx-auto" style="max-width: 400px;">
            <h2 class="fw-bold">Cliques da Turma</h2>
            <h1 id="contador" class="fw-bold">{{ cliques }}</h1>
            <button id="btn-clicker" class="btn btn-warning btn-lg w-100 py-3 fw-bold rounded-pill">⚡ CLICAR!</button>
            <p id="status" class="mt-3 text-muted">Conectando...</p>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const btn = document.getElementById('btn-clicker');
        const num = document.getElementById('contador');

        // Escuta o servidor
        socket.on('atualizar_cliques', (data) => {
            num.innerText = data.total_cliques;
            num.style.transform = "scale(1.2)";
            setTimeout(() => num.style.transform = "scale(1)", 100);
        });

        // Envia para o servidor
        btn.onclick = () => {
            socket.emit('clique_game');
        };

        socket.on('connect', () => {
            document.getElementById('status').innerText = "● Online";
            document.getElementById('status').classList.replace('text-muted', 'text-success');
        });
    </script>
</body>
</html>
